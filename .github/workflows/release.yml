name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'nq-rdl-release-bot[bot]'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          repositories: agent-skills,agent-extensions

      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Detect changelog state
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          has_unreleased=$(ls .changes/unreleased/ 2>/dev/null | grep -v .gitkeep | head -1)
          has_batched=""
          if [ -f ".changes/${version}.md" ]; then
            has_batched="true"
          fi

          if [ -z "$has_unreleased" ] && [ -z "$has_batched" ]; then
            echo "::error::No unreleased changelog entries or pre-batched version file found. Nothing to release."
            exit 1
          fi

          if [ -n "$has_unreleased" ] && [ -n "$has_batched" ]; then
            echo "::error::Both unreleased fragments and a pre-batched .changes/${version}.md exist. Refusing to re-batch and overwrite the existing file."
            echo "::error::This typically happens on a release retry when a fix PR added a new changie fragment."
            echo "::error::Resolve by picking one:"
            echo "::error::  (a) If the fragments belong in ${TAG}: merge their content into .changes/${version}.md and CHANGELOG.md, then delete the fragment files."
            echo "::error::  (b) If the fragments should not ship here (e.g. internal CI plumbing): delete the fragment files. For future retry PRs, apply the 'skip-changelog' label so changelog-check does not require a fragment."
            exit 1
          fi

          if [ -n "$has_unreleased" ]; then
            echo "needs_batch=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_batch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install changie
        if: steps.changelog.outputs.needs_batch == 'true'
        uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Batch and merge changelog
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Commit changelog updates
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changes/ CHANGELOG.md
          git commit -m "chore: update changelog for ${TAG}"
          git push origin HEAD:main

      - name: Move tag to include changelog commit
        if: steps.changelog.outputs.needs_batch == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" "${RUNNER_TEMP}/release-notes.md"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Install syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes ${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Trigger agent-extensions sync
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/nq-rdl/agent-extensions/dispatches \
            --method POST \
            --field event_type=agent-skills-release \
            --field 'client_payload[tag]='"$TAG"
