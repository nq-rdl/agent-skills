name: Validate Skills

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          manifest-path: pyproject.toml
          locked: true
          cache: true

      - run: pixi run validate-skills
