name: Validate Skills

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Build asctl
        working-directory: tools/asctl
        run: CGO_ENABLED=0 go build -o /usr/local/bin/asctl ./cmd/asctl/

      - name: Validate all skills
        run: asctl repo-check
