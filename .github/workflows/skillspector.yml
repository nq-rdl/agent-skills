name: SkillSpector

on:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run SkillSpector
        id: scan
        env:
          SKILLSPECTOR_FORMAT: sarif
          SKILLSPECTOR_OUTPUT: skillspector.sarif
        run: |
          set +e
          tools/skillspector/scan.sh
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload SARIF
        if: always() && hashFiles('skillspector.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
          category: skillspector

      - name: Enforce gate
        if: steps.scan.outputs.exit != '0'
        run: |
          echo "SkillSpector flagged a high-risk skill (exit ${{ steps.scan.outputs.exit }})." >&2
          exit 1
