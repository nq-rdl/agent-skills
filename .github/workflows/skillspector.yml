name: SkillSpector

on:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run SkillSpector
        id: scan
        env:
          SKILLSPECTOR_FORMAT: sarif
          SKILLSPECTOR_OUTPUT: skillspector.sarif
        run: |
          set +e
          tools/skillspector/scan.sh
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload SARIF
        if: always() && hashFiles('skillspector.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
          category: skillspector

      - name: Enforce gate
        if: steps.scan.outputs.exit != '0'
        env:
          SCAN_EXIT: ${{ steps.scan.outputs.exit }}
        run: |
          if [ "$SCAN_EXIT" = "1" ]; then
            echo "SkillSpector flagged a high-risk skill (risk score > 50)." >&2
          else
            echo "SkillSpector failed to run (exit $SCAN_EXIT): tool/execution error, not a finding." >&2
          fi
          exit 1
