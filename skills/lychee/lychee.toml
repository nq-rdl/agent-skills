# Default lychee configuration for documentation link checking.
# Bundled with the lychee skill — agents use this automatically.
# Projects can override by placing their own lychee.toml in the project root
# and passing --config to the wrapper.

# Cache results to .lycheecache to avoid re-checking on repeated runs
cache = true

# Include fragment checking (e.g., #section-name anchors)
include_fragments = true

# Max concurrent requests — throttle to avoid rate limiting
max_concurrency = 32

# Timeout per request (seconds)
timeout = 30

# Max retries for transient failures
max_retries = 3

# Exclude common false-positive patterns
exclude = [
  "^https?://quarto\\.org/docs/",
  # Localhost/example URLs
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.",
  "^https?://0\\.0\\.0\\.0",
  "^https?://example\\.com",
  "^https?://example\\.org",
  # Placeholder URLs
  "^https?://your-",
  "^https?://\\$",
  "^https?://\\{\\{",
  # Email addresses (often not real in docs)
  "^mailto:",
  # Private GitHub repositories
  # "^https://github\\.com/your-org/"  # add org-specific exclusions here
  "^https?://icons\\.getbootstrap\\.com",

  # Known external documentation issues (e.g., fragments that don't exist but the page does)
  "^https?://quarto\\.org/docs/faq/rmarkdown\\.html#quarto-vs.-r-markdown",

  # Quarto redirects their /docs/ page to another place which causes 404
  "^https?://quarto\\.org/docs/$",

  # local shiny references that use the file protocol
  "^file:///.+/skills/shiny-bslib/references/navigation\\.md",
]

# Exclude private/loopback IPs
exclude_all_private = true

# Accept common redirect status codes
accept = ["100..=103", "200..=299"]

# File extensions to check
extensions = ["md", "mdx", "txt", "rst", "html", "yaml", "yml", "toml", "json"]
