kind: Fixed
body: 'cc-web-setup: review hardening — write_stub() in the bootstrap test harness now removes any pre-existing entry before writing so the redirect cannot follow a coreutils symlink onto the real system binary; announce-capabilities.sh''s YAML description extractor now stops a block/folded scalar at a column-0 line (the closing `---` or a sibling key) and yields an empty description instead of leaking the next key or a bare `>-`/`|` indicator; and the devcontainer Dockerfile install test asserts apt packages within the apt-get install block and the npm/installer tools against their actual install line (not a comment) rather than a false-positive-prone substring check.'
