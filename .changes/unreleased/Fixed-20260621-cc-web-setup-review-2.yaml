kind: Fixed
body: 'cc-web-setup: second review pass — ensure_codex_auth() now trims surrounding whitespace from CODEX_ACCESS_TOKEN before piping it to `codex login --with-access-token` (a secret read from a file commonly carries a trailing newline, which codex would otherwise reject as a malformed JWT), and when the raw value carried whitespace it then drops the malformed live token so later `codex exec` calls fall back to the freshly written auth.json instead of re-parsing it; the `shellcheck-cc-web-setup` lefthook hook no longer ends in `|| true`, so it skips silently when shellcheck is absent but a real lint failure now blocks the commit instead of being swallowed; and the devcontainer `test_firewall_self_verification` test asserts the actual fail-closed control flow (reaching example.com exits 1, unreachable api.github.com exits 1) — constrained to the `then` branch so moving `exit 1` into `else` no longer satisfies it — rather than a substring check that passed even when the verification was inverted or removed.'
