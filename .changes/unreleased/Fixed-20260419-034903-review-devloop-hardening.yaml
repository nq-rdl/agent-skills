kind: Fixed
body: >-
  PR #69 review fixes for the go-first dev loop. Qualified lefthook pixi tasks
  with `-e default` to resolve multi-environment task ambiguity, enforced a
  changie fragment on pre-push, and added per-skill pytest jobs for the
  csv/docx/xlsx/pdf environments. Removed duplicate findSkillMD in
  tools/asctl/internal/validator (now calls parser.FindSkillMD) and added
  errcheck/gosec/unused to golangci-lint. Added [tool.ruff] configuration and
  excluded src/skills/ref/** from ty's legacy path. The .devcontainer now
  installs Go 1.25, lefthook, and changie; a postCreate setup.sh symlinks all
  skills/* into ~/.claude/skills, runs pixi install + lefthook install, and
  pre-builds asctl into ~/.local/bin so the Claude CLI sees every skill on
  first boot.
time: 2026-04-19T00:00:00Z
