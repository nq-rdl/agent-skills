kind: Added
body: 'Add the `sql-review-analyse` skill (#104): the handoff step that reads a finished SQL file and produces its templated review artifacts under `.sqlreview/` (`review.md` + `review.json`), capturing the cohort, data elements, assumptions, and limitations. Requires direct human-in-the-loop sign-off on every assumption and limitation before writing, asks the Data Engineer to clarify the cohort/data-element structure via `AskUserQuestion` when it is unclear (analyse owns this clarification for the suite), and resumes a prior review via git diff with an indirect-consequence check on the unchanged code. Ships `references/definitions.rst` (the shared suite definitions) and `references/artifact-contract.rst` (the `.sqlreview/` layout and review JSON shape it produces, matching what `sql-review-explain` consumes). The analyse step of the SQL Review suite (setup → bootstrap → analyse → explain).'
