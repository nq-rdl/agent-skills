kind: Added
body: 'Add the `sql-review-explain` skill (#106): an interactive, human-in-the-loop walkthrough that explains a SQL file against its `.sqlreview/` review artifacts, cross-referencing the code to the documented assumptions and limitations, and resuming a prior review via git diff with an indirect-consequence check on the unchanged code. Produces no new artifact. Ships `references/definitions.rst` (shared Assumption/Limitation definitions) and `references/artifact-contract.rst` (the `.sqlreview/` layout and review JSON shape it consumes). Final step of the SQL Review suite (setup → bootstrap → analyse → explain).'
