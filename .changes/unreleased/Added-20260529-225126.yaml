kind: Added
body: 'Add the `sql-review-explain` skill (#106): an interactive, human-in-the-loop working session, run with a Data Analyst, that walks a SQL file against its `.sqlreview/` review artifacts to confirm the captured assumptions are actually borne out by the code, and resumes a prior review via git diff with an indirect-consequence check on the unchanged code. Produces no new artifact. Ships `references/definitions.rst` (shared Assumption definition) and `references/artifact-contract.rst` (the `.sqlreview/` layout and review JSON shape it consumes). Verification step of the SQL Review suite (setup → bootstrap → analyse → explain); a separate downstream skill later uses the confirmed assumptions to explain the work to the client.'
time: 2026-05-29T22:51:26.861251489+00:00
