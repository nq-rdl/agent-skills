min_version: 1.9.0

pre-commit:
  parallel: true
  jobs:
    # --- Go: jules ---
    - name: go-vet-jules
      root: skills/jules/scripts/
      glob: "*.go"
      run: go vet ./...

    - name: go-format-jules
      root: skills/jules/scripts/
      glob: "*.go"
      run: test -z "$(gofmt -l {staged_files})"

    - name: go-build-jules
      root: skills/jules/scripts/
      glob: "*.go"
      run: CGO_ENABLED=0 go build ./...

    # --- Go: asctl ---
    - name: go-vet-asctl
      root: tools/asctl/
      glob: "*.go"
      run: go vet ./...

    - name: go-format-asctl
      root: tools/asctl/
      glob: "*.go"
      run: test -z "$(gofmt -l {staged_files})"

    - name: go-build-asctl
      root: tools/asctl/
      glob: "*.go"
      run: CGO_ENABLED=0 go build ./...

    # --- Python ---
    - name: ruff-lint
      glob: "*.py"
      run: pixi run -e default lint

    - name: ruff-format
      glob: "*.py"
      run: pixi run -e default -- ruff format --check .

    - name: typecheck
      glob: "*.py"
      run: pixi run -e default typecheck

    - name: validate-skills
      glob: "skills/**"
      run: pixi run -e default validate-skills

    - name: pixi-lock-check
      glob: "{pyproject.toml,pixi.lock}"
      run: pixi install --locked

    - name: lychee-links
      glob: "skills/**/*.md"
      run: command -v lychee >/dev/null 2>&1 && skills/lychee/scripts/check-links.sh {staged_files} || true

    # Optional shellcheck for the cc-web-setup skill's shipped shell assets/tests.
    # Skips silently when shellcheck is not on PATH, but a real lint failure must
    # block — so gate ONLY on tool presence, never `... || true` (which would also
    # swallow genuine warnings and make this hook purely advisory).
    - name: shellcheck-cc-web-setup
      glob: "skills/cc-web-setup/**/*.sh"
      run: |
        if command -v shellcheck >/dev/null 2>&1; then
          shellcheck -S warning skills/cc-web-setup/assets/*.sh skills/cc-web-setup/scripts/*.sh
        fi

commit-msg:
  # Non-blocking changie reminder. Prints a hint when no fragment was staged
  # on this branch; never exits non-zero. Hard enforcement lives in pre-push.
  jobs:
    - name: changie-hint
      run: |
        base=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
        if [ -n "$base" ] && ! git diff --name-only --diff-filter=A "$base"...HEAD -- '.changes/unreleased/*.yaml' 2>/dev/null | grep -q .; then
          echo ""
          echo "hint: no changie fragment added on this branch yet."
          echo "hint: run 'changie new' before pushing, or add 'skip-changelog' label to the PR."
        fi
        exit 0

pre-push:
  parallel: true
  jobs:
    - name: go-test-jules
      root: skills/jules/scripts/
      glob: "{*.go,go.mod,go.sum}"
      run: go test -race -count=1 ./...

    - name: go-test-asctl
      root: tools/asctl/
      glob: "{*.go,go.mod,go.sum}"
      run: go test -race -count=1 ./...

    - name: python-test
      glob: "*.py"
      run: pixi run -e default test

    - name: cc-web-setup-shell-test
      glob: "skills/cc-web-setup/**/*.sh"
      run: bash skills/cc-web-setup/scripts/test-cc-web-setup.sh && bash skills/cc-web-setup/scripts/test-web-bootstrap.sh

    - name: skillspector
      glob: "skills/**"
      # Informational: report findings but never block the push (CI uploads the
      # SARIF to the Security tab). Set SKILLSPECTOR_SKIP=1 to skip the scan.
      run: tools/skillspector/scan.sh || true

    - name: changie-fragment
      run: |
        base=$(git merge-base HEAD origin/main 2>/dev/null)
        if [ -z "$base" ]; then
          echo "cannot resolve merge-base with origin/main; skipping changie check"
          exit 0
        fi
        if ! git diff --name-only --diff-filter=A "$base"...HEAD -- '.changes/unreleased/*.yaml' | grep -q .; then
          echo "error: no changie fragment added on this branch."
          echo "  run: changie new"
          echo "  or add the 'skip-changelog' label to the PR if no changelog entry is needed."
          exit 1
        fi
